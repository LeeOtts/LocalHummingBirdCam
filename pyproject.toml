[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"
markers = ["memory: memory profiling tests (may be slow)"]

[tool.coverage.run]
source = ["."]
omit = ["tests/*", ".claude/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]
fail_under = 60

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line too long — handled by formatter
    "E402",   # module level import not at top (config.py uses this intentionally)
]
