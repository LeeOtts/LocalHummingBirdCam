<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backyard Hummers - {{ clip.name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <meta property="og:title" content="Hummingbird Sighting - Backyard Hummers">
    <meta property="og:description" content="{{ clip.caption or 'Caught on camera at the hummingbird feeder!' }}">
    <meta property="og:type" content="video.other">
    <meta property="og:video" content="{{ host }}/clips/{{ clip.name }}">
    <meta property="og:video:type" content="video/mp4">
    <meta name="twitter:card" content="player">
    <meta name="twitter:title" content="Hummingbird Sighting">
    <meta name="twitter:description" content="{{ clip.caption or 'Caught on camera!' }}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0d1a12;
            color: #e8f0ea;
            min-height: 100vh;
        }
        header {
            background: #0d1a12;
            text-align: center;
            border-bottom: 3px solid #c4392a;
            padding: 20px;
        }
        header h1 { color: #e8f0ea; font-size: 1.8em; }
        nav { text-align: center; padding: 15px; background: rgba(13,26,18,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #1e3625; }
        nav a { font-family:'Patrick Hand',cursive; font-size:0.85rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#a3b8a6; text-decoration: none; margin: 0 15px; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
        .video-wrap { border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .video-wrap video { width: 100%; display: block; }
        .caption-box {
            background: #152419;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1e3625;
            font-style: italic;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .meta { color: #a3b8a6; font-size: 0.9em; }
        .back-link { display: inline-block; margin-top: 20px; color: #d4a017; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <h1>Backyard Hummers</h1>
    </header>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/gallery">Gallery</a>
        <a href="/analytics">Analytics</a>
        <a href="/compose">Compose</a>
    </nav>
    <div class="container">
        <div class="video-wrap">
            <video controls autoplay muted preload="auto">
                <source src="/clips/{{ clip.name }}" type="video/mp4">
            </video>
        </div>
        {% if clip.caption %}
        <div class="caption-box">"{{ clip.caption }}"</div>
        {% endif %}
        <div class="meta">
            {{ clip.time }} &mdash; {{ clip.size }}
        </div>
        <a href="/gallery" class="back-link">Back to Gallery</a>
    </div>
</body>
</html>
